name: generate profile assets

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: generate contribution snake svgs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0071e3&color_dots=#f5f5f7,#d2d2d7,#86868b,#424245,#1d1d1f
            dist/github-contribution-grid-snake-dark.svg?color_snake=#2997ff&color_dots=#161b22,#30363d,#484f58,#8b949e,#f5f5f7

      - name: generate wakatime summary cards
        run: python3 scripts/generate_cards.py

      - name: push assets to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
